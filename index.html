<!doctype html>
<html>
  <head>
    <title>MDBList API Reference</title>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="Interactive API reference for MDBList powered by Scalar." />
    <style>
      html,
      body,
      #app {
        height: 100%;
        margin: 0;
      }
    </style>
  </head>

  <body>
    <div id="app"></div>

    <!-- Load the Script -->
    <script src="https://cdn.jsdelivr.net/npm/@scalar/api-reference"></script>

    <!-- Initialize the Scalar API Reference -->
    <script>
      Scalar.createApiReference('#app', {
        url: 'openapi.json',
        pageTitle: 'MDBList API Reference',
        darkMode: false,
        hideDownloadButton: true,
        defaultHttpClient: {
          targetKey: 'js',
          clientKey: 'fetch',
        },
      })
    </script>
  </body>
</html>
